  WAVE: greeting
  YES: affirmative
  NO: negative
  HELP: help
  ME: need_help
  WAIT: pause
  THANKS: gratitude
  STOP: stop
  COME HERE: request
  DRINK: need_water
  EAT: need_food
  BATHROOM: need_bathroom

intent_to_sentence:
  pause: Please wait.
  greeting: Hello.
  affirmative: Yes.
  negative: No.
  help: I need help.
  gratitude: Thank you.
