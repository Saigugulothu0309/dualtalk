server:
  host: "0.0.0.0"
  port: 8765
  url: "ws://127.0.0.1:8765"

camera:
  index: 0
  width: 1280
  height: 720
  fps: 30

detection:
  max_num_hands: 2
  detection_confidence: 0.7
  tracking_confidence: 0.7
  confidence_threshold: 0.75
  stable_frame_count: 5
  wave_buffer_size: 12

sentence_builder:
  timeout_seconds: 2.0

gestures:
  profile: "hospital"
  profiles_dir: "config/gestures"

communication:
  send_debounce_seconds: 0.2
  reconnect_delay_seconds: 2.0
  encrypted: false
  encryption_key: null

tts:
  rate: 150
  volume: 1.0
  enabled: true

stt:
  language: "en-US"
  timeout: 5
  phrase_time_limit: 10

language:
  default: "en"

ui:
  offline_width: 1280
  offline_height: 720
